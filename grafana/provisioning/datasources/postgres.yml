apiVersion: 1

datasources:
  - name: Jira Metrics
    type: postgres
    uid: jira-metrics-pg
    url: postgres:5432
    user: metrics
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: jira_metrics
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
