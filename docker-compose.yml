services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: jira_metrics
      POSTGRES_USER: metrics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics -d jira_metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/sprint-detail.json
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - proxy_net

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - proxy_net

  jira-sync:
    build: ./jira-sync
    restart: unless-stopped
    volumes:
      - ./jira-sync/sync.py:/app/sync.py:ro
    environment:
      JIRA_URL: ${JIRA_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_PROJECT_KEYS: ${JIRA_PROJECT_KEYS}
      JIRA_STORY_POINTS_FIELD: ${JIRA_STORY_POINTS_FIELD:-customfield_10016}
      JIRA_QA_FIELD: ${JIRA_QA_FIELD:-customfield_10132}
      JIRA_ACCEPTANCE_CRITERIA_FIELD: ${JIRA_ACCEPTANCE_CRITERIA_FIELD:-customfield_10028}
      JIRA_HISTORY_START: ${JIRA_HISTORY_START:-2024-01-01}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      POSTGRES_HOST: postgres
      POSTGRES_DB: jira_metrics
      POSTGRES_USER: metrics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

networks:
  default:
    driver: bridge
  proxy_net:
    external: true

volumes:
  postgres_data:
  grafana_data:
